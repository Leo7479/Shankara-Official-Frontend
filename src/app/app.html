@if(loading()){
    <div class="spinner-container">
        <div class="spinner">
            <span class="r1" style="--delay:0s"></span>
            <span class="r2" style="--delay:0.25s"></span>
            <span class="r3" style="--delay:0.5s"></span>
            <span class="r4" style="--delay:0.75s"></span>
            <span class="r5" style="--delay:1s"></span>
        </div>
    </div>
}
